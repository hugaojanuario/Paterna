version: 2

project_name: paterna

before:
  hooks:
    - go mod tidy

builds:
  - id: paterna
    main: ./cmd/cli
    binary: paterna
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hugaojanuario/Paterna/internal/version.Version={{.Version}}
      - -X github.com/hugaojanuario/Paterna/internal/version.Commit={{.Commit}}
      - -X github.com/hugaojanuario/Paterna/internal/version.Date={{.Date}}

archives:
  - id: paterna
    name_template: "paterna_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: hugaojanuario
    name: Paterna
  draft: false
  prerelease: auto
